server {
    listen 80;
    server_name kfire.kbcosmos.com;
    
    # SSL 인증서 발급을 위한 ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # HTTP를 HTTPS로 리다이렉트
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name kfire.kbcosmos.com;

    # SSL 인증서 경로 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/kfire.kbcosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kfire.kbcosmos.com/privkey.pem;
    
    # SSL 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # 로그 설정
    access_log /var/log/nginx/kfire.kbcosmos.com.access.log;
    error_log /var/log/nginx/kfire.kbcosmos.com.error.log;

    # 정적 파일 서빙
    location /static {
        alias /var/www/kfire.kbcosmos.com/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 메인 애플리케이션
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
